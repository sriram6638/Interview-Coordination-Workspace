apiVersion: apps/v1
kind: Deployment
metadata:
  name: interview-postgres
  labels:
    app: interview-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: interview-postgres
  template:
    metadata:
      labels:
        app: interview-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: interview_coordination
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: interview-secrets
                  key: postgres_password
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
