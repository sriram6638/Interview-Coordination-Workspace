apiVersion: v1
kind: Namespace
metadata:
  name: interview-coordination
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: interview-coordination
data:
  NODE_ENV: "production"
  PORT: "4000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: interview-backend
  namespace: interview-coordination
  labels:
    app: interview-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: interview-backend
  template:
    metadata:
      labels:
        app: interview-backend
    spec:
      containers:
      - name: backend
        image: BACKEND_IMAGE_PLACEHOLDER
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4000
        env:
        - name: PORT
          value: "4000"
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DATABASE_URL
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: NEXTAUTH_SECRET
        - name: FRONTEND_URL
          value: "http://interview-frontend"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: interview-backend
  namespace: interview-coordination
spec:
  type: ClusterIP
  ports:
  - port: 4000
    targetPort: 4000
    protocol: TCP
  selector:
    app: interview-backend
