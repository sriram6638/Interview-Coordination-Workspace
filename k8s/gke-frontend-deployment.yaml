apiVersion: apps/v1
kind: Deployment
metadata:
  name: interview-frontend
  namespace: interview-coordination
  labels:
    app: interview-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: interview-frontend
  template:
    metadata:
      labels:
        app: interview-frontend
    spec:
      containers:
      - name: frontend
        image: FRONTEND_IMAGE_PLACEHOLDER
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://interview-backend:4000"
        - name: NEXTAUTH_URL
          value: "http://interview-frontend"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: interview-frontend
  namespace: interview-coordination
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: interview-frontend
