services:
  postgres:
    image: postgres:15-alpine
    container_name: interview-db
    environment:
      POSTGRES_DB: interview_coordination
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: interview-backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/interview_coordination"
      NEXTAUTH_SECRET: "local-dev-secret-change-in-production"
      FRONTEND_URL: "http://localhost:3000"
      SMTP_HOST: ""
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: ""
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:4000"
    container_name: interview-frontend
    ports:
      - "3000:3000"
    environment:
      NEXTAUTH_URL: "http://localhost:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
