name: Deploy to GKE

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER_NAME }}
  GKE_REGION: ${{ secrets.GKE_REGION }}
  REGISTRY_HOSTNAME: ${{ secrets.GKE_REGION }}-docker.pkg.dev
  IMAGE_NAME_BACKEND: interview-backend
  IMAGE_NAME_FRONTEND: interview-frontend

jobs:
  setup-build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
        service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Configure Docker authentication
      run: |
        gcloud auth configure-docker ${{ env.REGISTRY_HOSTNAME }}

    - name: Build Backend Docker image
      run: |
        docker build -t "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}" \
          -t "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME_BACKEND }}:latest" \
          -f backend/Dockerfile .

    - name: Build Frontend Docker image
      run: |
        docker build -t "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}" \
          -t "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME_FRONTEND }}:latest" \
          -f Dockerfile.frontend \
          --build-arg NEXT_PUBLIC_API_URL="http://interview-backend:4000" .

    - name: Push Backend image to Artifact Registry
      run: |
        docker push "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}"
        docker push "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME_BACKEND }}:latest"

    - name: Push Frontend image to Artifact Registry
      run: |
        docker push "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}"
        docker push "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME_FRONTEND }}:latest"

    - name: Get GKE credentials
      run: |
        gcloud container clusters get-credentials "${{ env.GKE_CLUSTER }}" \
          --region "${{ env.GKE_REGION }}" \
          --project "${{ env.PROJECT_ID }}"

    - name: Create namespace
      run: |
        kubectl create namespace interview-coordination --dry-run=client -o yaml | kubectl apply -f -

    - name: Create database credentials secret
      run: |
        kubectl create secret generic db-credentials \
          --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
          --namespace=interview-coordination \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Create app secrets
      run: |
        kubectl create secret generic app-secrets \
          --from-literal=NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
          --namespace=interview-coordination \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy Backend to GKE
      run: |
        kubectl set image deployment/interview-backend \
          interview-backend=${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }} \
          --namespace=interview-coordination \
          2>/dev/null || \
        (sed "s|BACKEND_IMAGE_PLACEHOLDER|${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}|g" \
          k8s/gke-backend-deployment.yaml | kubectl apply -f -)

    - name: Deploy Frontend to GKE
      run: |
        kubectl set image deployment/interview-frontend \
          interview-frontend=${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }} \
          --namespace=interview-coordination \
          2>/dev/null || \
        (sed "s|FRONTEND_IMAGE_PLACEHOLDER|${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}|g" \
          k8s/gke-frontend-deployment.yaml | kubectl apply -f -)

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/interview-backend -n interview-coordination --timeout=5m
        kubectl rollout status deployment/interview-frontend -n interview-coordination --timeout=5m

    - name: Get service info
      run: |
        echo "Frontend Service:"
        kubectl get service interview-frontend -n interview-coordination
        echo ""
        echo "Backend Service:"
        kubectl get service interview-backend -n interview-coordination
        echo ""
        echo "Deployment Status:"
        kubectl get deployments -n interview-coordination
